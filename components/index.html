<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailInsight | Data Mining Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="nav-gradient text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter animate__animated animate__fadeInLeft">
                RETAIL<span class="text-blue-400">INSIGHT</span>
            </h1>
            <div class="animate__animated animate__fadeInRight text-xs font-mono bg-white/10 px-3 py-1 rounded-full">
                Retail Analytics Program
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-6">
        <section class="glass-card p-8 mb-10 animate__animated animate__fadeInUp">
            <h2 class="text-lg font-bold mb-4">Step 1: Ingest Data</h2>
            <label class="upload-area">
                <div class="flex flex-col items-center">
                    <svg class="w-10 h-10 text-blue-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-sm">Click to load <span class="font-bold text-blue-600">csv file</span></p>
                </div>
                <input id="csvUpload" type="file" class="hidden" accept=".csv" />
            </label>
        </section>

        <div id="dashboard" class="hidden">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="glass-card p-6 animate__animated animate__zoomIn delay-1">
                    <span class="text-slate-400 text-xs font-bold uppercase">Volume</span>
                    <div id="totalTrans" class="text-3xl font-black mt-1">-</div>
                </div>
                <div class="glass-card p-6 animate__animated animate__zoomIn delay-2">
                    <span class="text-slate-400 text-xs font-bold uppercase">Avg. Spending</span>
                    <div id="avgSpend" class="text-3xl font-black mt-1 text-green-600">-</div>
                </div>
                <div class="glass-card p-6 animate__animated animate__zoomIn delay-3">
                    <span class="text-slate-400 text-xs font-bold uppercase">Top Category</span>
                    <div id="topCat" class="text-3xl font-black mt-1 text-blue-600">-</div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="glass-card p-8 animate__animated animate__fadeInUp">
                    <h3 class="font-bold mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                        Customer Segments
                    </h3>
                    <canvas id="clusterChart"></canvas>
                </div>

                <div class="glass-card p-8 animate__animated animate__fadeInUp border-l-4 border-blue-500">
                    <h3 class="font-bold mb-1">Revenue Predictor</h3>
                    <p class="text-xs text-slate-400 mb-6">Trained Linear Regression Model</p>
                    
                    <div class="space-y-4">
                        <div class="group">
                            <label class="label-text">Unit Price</label>
                            <input type="number" id="predPrice" value="100" class="input-field">
                        </div>
                        <div class="group">
                            <label class="label-text">Quantity</label>
                            <input type="number" id="predQty" value="1" class="input-field">
                        </div>
                        <button onclick="predictAmount()" class="predict-btn">Run Prediction</button>
                        
                        <div class="prediction-box">
                            <span class="text-xs font-bold text-blue-400">ESTIMATED TOTAL</span>
                            <div id="predictionResult" class="text-4xl font-black text-blue-900">$0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
